name: Claude Security Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ── Automated security review on every PR ────────────────────
  security-review:
    name: Security Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 5"
          prompt: |
            Review this pull request for security vulnerabilities. This is a
            Rust syslog server handling untrusted network input. Focus on:

            1. **Memory safety** — buffer overflows, use-after-free, unsafe blocks
            2. **Input validation** — malformed syslog messages, oversized fields,
               injection via structured data parameters
            3. **Denial of service** — unbounded allocations, missing size limits,
               algorithmic complexity attacks on parsing
            4. **TLS/crypto** — certificate validation, cipher suite selection,
               key material handling, timing side-channels
            5. **Authentication & authorization** — management API access control
            6. **Information disclosure** — sensitive data in logs or error messages,
               stack traces leaking to clients
            7. **Dependency risk** — new or changed dependencies with known CVEs
               or excessive permissions

            For each finding, include:
            - Severity: critical / high / medium / low
            - Affected file and line range
            - Description of the vulnerability
            - Suggested fix

            If no security issues are found, confirm the PR looks clean.

  # ── On-demand via @claude mention ────────────────────────────
  claude-mention:
    name: Claude (on mention)
    if: >
      github.event_name == 'issue_comment' ||
      github.event_name == 'pull_request_review_comment'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          claude_args: "--max-turns 10"
