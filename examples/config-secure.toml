# syslog-usg — Secure Production Configuration Example
#
# This configuration demonstrates a hardened deployment with:
# - TLS listener with mutual authentication (mTLS)
# - Per-source-IP connection limits
# - UDP listener on localhost only (for local apps)
# - RFC 5848 message signing with RSID persistence
# - RFC 5848 signature verification with replay detection persistence
# - Authenticated management endpoints
# - Alarm filtering (RFC 5674)
# - File, buffer, and console management actions
#
# Key files accept both PEM and DER format (auto-detected).
#
# Environment variables:
#   SYSLOG_METRICS_TOKEN — bearer token for /metrics and /management/*
#   SYSLOG_RELAY_HOST    — downstream relay address (default: 10.0.0.2)

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
[server]
drain_timeout_seconds = 10

# ---------------------------------------------------------------------------
# Listeners
# ---------------------------------------------------------------------------

# TLS listener with client certificate verification (mTLS)
# RFC 5425: TLS transport mapping for syslog
[[listeners]]
protocol = "tls"
bind_address = "0.0.0.0:6514"
max_connections = 1000
max_connections_per_ip = 50
read_timeout_secs = 30

[listeners.tls]
cert_path = "/etc/syslog-usg/tls/server.crt"
key_path = "/etc/syslog-usg/tls/server.key"
client_auth = true
ca_path = "/etc/syslog-usg/tls/client-ca.crt"

# UDP listener — localhost only for local applications
# RFC 5426: UDP has no authentication; restrict to trusted interfaces
[[listeners]]
protocol = "udp"
bind_address = "127.0.0.1:514"

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------

# Forward to a central TLS-secured relay
[[outputs]]
name = "central-relay"
protocol = "tls"
address = "${SYSLOG_RELAY_HOST:-10.0.0.2}:6514"

[outputs.tls]
cert_path = "/etc/syslog-usg/tls/relay-client.crt"
key_path = "/etc/syslog-usg/tls/relay-client.key"
ca_path = "/etc/syslog-usg/tls/relay-ca.crt"

# ---------------------------------------------------------------------------
# Pipeline
# ---------------------------------------------------------------------------
[pipeline]
channel_buffer_size = 8192
max_message_size = 65536
signing_fail_open = false  # Drop messages if signing fails

# Alarm filter — only forward critical/major alarms
[pipeline.alarm_filter]
enabled = true
min_severity = "major"
event_types = ["communicationsAlarm", "equipmentAlarm", "processingErrorAlarm"]
non_alarm_policy = "pass"
max_active_alarms = 10000

# ---------------------------------------------------------------------------
# Signing (RFC 5848)
# ---------------------------------------------------------------------------
[signing]
enabled = true
key_path = "/etc/syslog-usg/sign/signing.key"        # PEM or DER
cert_path = "/etc/syslog-usg/sign/signing.crt"        # PEM or DER
hash_algorithm = "sha256"
signature_group = "global"
max_hashes_per_block = 25
cert_emit_interval_secs = 3600
state_dir = "/var/lib/syslog-usg/signing"              # RSID persistence

# ---------------------------------------------------------------------------
# Verification (RFC 5848)
# ---------------------------------------------------------------------------
[verification]
enabled = true
trusted_key_paths = [
    "/etc/syslog-usg/sign/trusted-upstream-1.pub",    # PEM or DER
    "/etc/syslog-usg/sign/trusted-upstream-2.pub",
]
reject_unverified = false  # Accept unsigned messages (set true for strict mode)
state_path = "/var/lib/syslog-usg/replay-state.txt"   # Replay detector persistence

# ---------------------------------------------------------------------------
# Management Actions (RFC 9742)
# ---------------------------------------------------------------------------

# Forward critical alerts to a dedicated security collector
[[actions]]
description = "Security alerts to SOC"
[actions.selector]
min_severity = "critical"
facilities = ["auth", "authpriv"]
[actions.action]
type = "remote"
host = "soc-collector.internal"
port = 6514
protocol = "tls"

# Write all messages to a local audit log file
[[actions]]
description = "Local audit log"
[actions.selector]
facilities = ["auth", "authpriv"]
[actions.action]
type = "file"
path = "/var/log/syslog-usg/audit.log"

# Keep last 1000 error messages in memory for debugging
[[actions]]
description = "Recent errors buffer"
[actions.selector]
min_severity = "error"
[actions.action]
type = "buffer"
name = "recent-errors"
size = 1000

# Print kern messages to console (stdout) for debugging
[[actions]]
description = "Kernel messages to console"
[actions.selector]
facilities = ["kern"]
[actions.action]
type = "console"

# Discard debug-level messages from noisy applications
[[actions]]
description = "Drop verbose debug from chatty-app"
[actions.selector]
max_severity = "debug"
app_name_pattern = "^chatty-app$"
[actions.action]
type = "discard"

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[logging]
level = "info"
format = "json"

# ---------------------------------------------------------------------------
# Metrics & Management
# ---------------------------------------------------------------------------
[metrics]
enabled = true
bind_address = "127.0.0.1:9090"
bearer_token = "${SYSLOG_METRICS_TOKEN}"
