# rsyslog config: forward RFC 3164 (traditional) messages over TCP
# __TARGET_HOST__ and __TARGET_PORT__ are replaced at test time.

module(load="imuxsock")

# Traditional syslog format (RFC 3164-like)
template(name="traditional" type="string"
    string="<%PRI%>%TIMESTAMP% %HOSTNAME% %syslogtag%%msg%\n"
)

# Forward over TCP with octet-counting
*.* action(
    type="omfwd"
    target="__TARGET_HOST__"
    port="__TARGET_PORT__"
    protocol="tcp"
    template="traditional"
    TCP_Framing="octet-counted"
)
