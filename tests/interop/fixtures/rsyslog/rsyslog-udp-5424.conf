# rsyslog config: forward RFC 5424 messages over UDP
# __TARGET_HOST__ and __TARGET_PORT__ are replaced at test time.

module(load="imuxsock")

# RFC 5424 template matching rsyslog's RSYSLOG_SyslogProtocol23Format
template(name="rfc5424" type="string"
    string="<%PRI%>1 %TIMESTAMP:::date-rfc3339% %HOSTNAME% %APP-NAME% %PROCID% %MSGID% %STRUCTURED-DATA% %msg%\n"
)

# Forward all messages over UDP in RFC 5424 format
*.* action(
    type="omfwd"
    target="__TARGET_HOST__"
    port="__TARGET_PORT__"
    protocol="udp"
    template="rfc5424"
)
