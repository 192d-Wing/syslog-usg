@version: 4.0
# syslog-ng config: forward RFC 3164 (legacy) messages over TCP
# __TARGET_HOST__ and __TARGET_PORT__ are replaced at test time.

options {
    keep-hostname(yes);
    chain-hostnames(no);
    use-fqdn(no);
    time-reopen(10);
};

source s_local {
    unix-dgram("/dev/log");
};

# network() with no flags(syslog-protocol) sends legacy format
destination d_remote {
    network(
        "__TARGET_HOST__"
        port(__TARGET_PORT__)
        transport("tcp")
    );
};

log {
    source(s_local);
    destination(d_remote);
};
